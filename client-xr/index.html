<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>World of Geneva — XR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      overflow: hidden;
      background: #111;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    canvas { display: block; touch-action: none; }

    body[data-app-mode="display"] {
      background: #000;
    }

    body[data-app-mode="display"] > :not(canvas):not(script):not([data-debug-overlay]) {
      display: none !important;
    }

    body[data-app-mode="display"] canvas {
      pointer-events: none;
    }

    #hud {
      position: fixed;
      top: 12px;
      right: 184px;
      color: #ddd;
      font: 11px/1.4 monospace;
      pointer-events: none;
      z-index: 10;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      opacity: 0.55;
    }
    #hud .label { color: #888; font-size: 12px; }
    #hud .value { color: #4f8; }

    #controls-help {
      position: fixed;
      bottom: 12px;
      left: 12px;
      color: #555;
      font: 11px/1.5 monospace;
      z-index: 10;
      pointer-events: none;
    }

    #lock-indicator {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      padding: 6px 16px;
      background: rgba(30, 60, 40, 0.9);
      border: 1px solid #4f8;
      border-radius: 6px;
      color: #4f8;
      font: bold 12px monospace;
      z-index: 10;
      pointer-events: none;
      text-shadow: 0 0 6px rgba(68, 255, 136, 0.4);
    }

    #vr-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 24px;
      background: #2a6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font: bold 16px monospace;
      cursor: pointer;
      z-index: 10;
      display: none;
    }
    #vr-button:hover { background: #3b7; }

    /* Mobile landscape: scale HUD to 50%. Phones land in this bucket (height ~400-500px); tablets and desktops stay full-size. */
    @media (orientation: landscape) and (max-height: 500px) {
      #hud,
      #controls-help,
      #intent-mode-badge,
      #intent-tooltip,
      #minimap,
      #animation-lab-panel,
      #equip-tuner,
      #entity-inspector,
      #player-panel,
      #vitals-panel,
      #quest-panel,
      #skills-panel,
      #bag-panel,
      #inbox-panel,
      #run-panel,
      #chat-log,
      #agent-chat,
      #settings-panel,
      #vr-button {
        transform: scale(0.5) !important;
      }
      /* Top-left anchored */
      #hud,
      #player-panel,
      #vitals-panel { transform-origin: top left !important; }
      /* Bottom-left anchored */
      #controls-help,
      #chat-log,
      #agent-chat { transform-origin: bottom left !important; }
      /* Top-right anchored */
      #intent-mode-badge,
      #intent-tooltip,
      #minimap,
      #animation-lab-panel,
      #equip-tuner,
      #settings-panel,
      #quest-panel { transform-origin: top right !important; }
      /* Bottom-right anchored */
      #bag-panel,
      #skills-panel,
      #inbox-panel,
      #run-panel,
      #vr-button { transform-origin: bottom right !important; }
      /* Bottom-center (preserves existing translateX(-50%)) */
      #lock-indicator {
        transform: translateX(-50%) scale(0.5) !important;
        transform-origin: bottom center !important;
      }
    }
  </style>
</head>
<body data-app-mode="controller">
  <div id="hud">
    <div><span class="label">Entities:</span> <span id="hud-entities" class="value">0</span></div>
    <div><span class="label">FPS:</span> <span id="hud-fps" class="value">--</span></div>
  </div>

  <div id="lock-indicator"></div>

  <div id="controls-help">
    Right-drag / 1-finger drag: orbit | Scroll / pinch: zoom | Tap/click: move | Esc: unlock | R: run | T: chat | Q: quests
  </div>

  <button id="vr-button">Enter VR</button>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>World of Geneva — Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      overflow: hidden;
      background: #000;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    canvas { display: block; touch-action: none; pointer-events: none; }

    body[data-app-mode="display"] > :not(canvas):not(script):not([data-debug-overlay]) {
      display: none !important;
    }
  </style>
</head>
<body data-app-mode="display">
  <div id="hud">
    <div><span class="label">Entities:</span> <span id="hud-entities" class="value">0</span></div>
    <div><span class="label">FPS:</span> <span id="hud-fps" class="value">--</span></div>
  </div>

  <div id="lock-indicator"></div>
  <div id="controls-help"></div>
  <button id="vr-button">Enter VR</button>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
